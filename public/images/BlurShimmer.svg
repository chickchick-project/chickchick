<svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f7f8" />
      <stop offset="20%" stop-color="#edeef1" />
      <stop offset="40%" stop-color="#f6f7f8" />
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="0 -1"
        to="0 1"
        dur="1s"
        repeatCount="indefinite"
      />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#shimmer)" />
</svg>